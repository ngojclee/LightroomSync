name: windows-release

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*.*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (x.y.z.k). Optional for manual runs."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $version = ""

          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.version }}") {
            $version = "${{ inputs.version }}"
          } elseif ("${{ github.ref }}" -like "refs/tags/v*") {
            $version = "${{ github.ref_name }}".Substring(1)
          } else {
            $version = "2.0.0.${{ github.run_number }}"
          }

          if ($version -notmatch '^\d+\.\d+\.\d+\.\d+$') {
            throw "Invalid version '$version'. Expected x.y.z.k"
          }

          "value=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Resolved version: $version"

      - name: Test
        run: go test ./... -count=1

      - name: Build binaries
        shell: pwsh
        run: |
          ./scripts/build_windows.ps1 -Version "${{ steps.version.outputs.value }}" -SkipTests

      - name: Import code-signing certificate (optional)
        if: ${{ secrets.CODESIGN_CERT_BASE64 != '' && secrets.CODESIGN_CERT_PASSWORD != '' }}
        shell: pwsh
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String("${{ secrets.CODESIGN_CERT_BASE64 }}"))
          $securePassword = ConvertTo-SecureString "${{ secrets.CODESIGN_CERT_PASSWORD }}" -AsPlainText -Force
          Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $securePassword | Out-Null
          Write-Host "Code-signing certificate imported."

      - name: Sign binaries (optional)
        if: ${{ secrets.CODESIGN_CERT_BASE64 != '' && secrets.CODESIGN_CERT_PASSWORD != '' }}
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.value }}"
          $files = @(
            "build/release/LightroomSyncAgent-v$version-windows-amd64.exe",
            "build/release/LightroomSyncUI-v$version-windows-amd64.exe"
          )

          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Filter signtool.exe -Recurse -ErrorAction SilentlyContinue |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signtool) {
            throw "signtool.exe not found on runner"
          }

          $timestampUrl = if ("${{ secrets.CODESIGN_TIMESTAMP_URL }}") { "${{ secrets.CODESIGN_TIMESTAMP_URL }}" } else { "http://timestamp.digicert.com" }
          $selector = @()
          if ("${{ secrets.CODESIGN_CERT_THUMBPRINT }}") {
            $selector = @("/sha1", "${{ secrets.CODESIGN_CERT_THUMBPRINT }}")
          } elseif ("${{ secrets.CODESIGN_SUBJECT_NAME }}") {
            $selector = @("/n", "${{ secrets.CODESIGN_SUBJECT_NAME }}")
          } else {
            throw "Provide either CODESIGN_CERT_THUMBPRINT or CODESIGN_SUBJECT_NAME secret."
          }

          foreach ($file in $files) {
            & $signtool.FullName sign /fd SHA256 /td SHA256 /tr $timestampUrl /sm /s MY @selector $file
            if ($LASTEXITCODE -ne 0) {
              throw "Signing failed for $file"
            }
          }

      - name: Repack release zip
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.value }}"
          $prefix = "LightroomSync-v$version-windows-amd64"
          $zipPath = "build/release/$prefix.zip"
          $assetList = @(
            "build/release/LightroomSyncAgent-v$version-windows-amd64.exe",
            "build/release/LightroomSyncUI-v$version-windows-amd64.exe",
            "build/release/$prefix-build-metadata.json"
          )

          if (Test-Path -LiteralPath $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }
          Compress-Archive -LiteralPath $assetList -DestinationPath $zipPath -CompressionLevel Optimal

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-${{ steps.version.outputs.value }}
          path: build/release/*
          if-no-files-found: error

      - name: Publish GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: Lightroom Sync v${{ steps.version.outputs.value }}
          files: build/release/*
          generate_release_notes: true
